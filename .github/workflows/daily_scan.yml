name: Daily US Stock Scan

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 22:00 UTC, Mon-Fri = after US market close
  workflow_dispatch:          # adds a "Run workflow" button for instant testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install yfinance pandas

      - run: python daily_scan_email.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
